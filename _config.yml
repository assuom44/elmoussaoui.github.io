title: Welcome to Mohamed El-Moussaoui's homepage
description: Dr. Mohamed EL-MOUSSAOUI is a dedicated and accomplished PhD student at Chouaib Doukkali University, currently pursuing his doctoral studies at the Information Technology Laboratory, National School of Sciences of El Jadida. With a keen focus on advancing knowledge in the field of information technology, Dr. EL-MOUSSAOUI demonstrates his commitment and enthusiasm in his research endeavors. His contributions to the realm of Data Science and his scholarly pursuits make him a valuable asset to the academic community.
